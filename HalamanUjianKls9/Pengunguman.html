<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profil Siswa | Ujian Online SMP Harapan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      body {
        background-color: #f4f6f9;
        font-family: "Segoe UI", sans-serif;
      }

      /* === SIDEBAR === */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 240px;
        background-color: #212529;
        color: white;
        padding-top: 20px;
      }

      .sidebar h4 {
        text-align: center;
        color: #f8f9fa;
        font-weight: 700;
        margin-bottom: 30px;
      }

      .sidebar a {
        display: block;
        padding: 12px 20px;
        color: #ddd;
        text-decoration: none;
        border-radius: 8px;
        margin: 5px 10px;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background-color: royalblue;
        color: white;
      }

      /* === MAIN CONTENT === */
      .main-content {
        margin-left: 260px;
        padding: 20px;
      }

      .pembuka {
        background-color: royalblue;
        border-radius: 20px;
        padding: 40px 20px;
        color: white;
        text-align: center;
        font-weight: 800;
        margin-bottom: 30px;
      }

      .isi {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }
      textarea{
        font-weight: 800;
        text-align: center;
        align-items: center;
      } 

      @media (max-width: 992px) {
        .sidebar {
          display: none;
        }
        .main-content {
          margin-left: 0;
        }
        .isi {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR (Mobile) -->
    <nav class="navbar navbar-dark bg-dark d-lg-none">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <a class="navbar-brand" href="#">Pengunguman Siswa</a>
      </div>
    </nav>

    <!-- SIDEBAR (Desktop) -->
    <div class="sidebar d-none d-lg-block">
      <h4>Menu Siswa</h4>
      <a href="Dashboard.html">🏠 Dashboard</a>
      <a href="DaftarUjian.html">📝 Ujian</a>
      <a href="NilaiUjian.html">📊 Nilai Ujian</a>
      <a href="#" class="active">📢 Pengumuman</a>
      <a href="Profile.html">👤 Profil</a>
    </div>

    <!-- OFFCANVAS (Mobile Sidebar) -->
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu Siswa</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li><a class="nav-link" href="Dashboard.html">Dashboard</a></li>
          <li><a class="nav-link" href="DaftarUjian.html">Ujian</a></li>
          <li><a class="nav-link" href="NilaiUjian.html">Nilai Ujian</a></li>
          <li><a class="nav-link" href="#">Pengumuman</a></li>
          <li><a class="nav-link active" href="Profile.html">Profil</a></li>
        </ul>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="pembuka">
        <h1>Selamat Datang di Halaman Profil Siswa</h1>
      </div>

      <div class="isi">
        <textarea name="" id="" cols="150" rows="15">
          Tidak ada Pengunguman Terbaru Untuk saat Ini 
        </textarea>
      </div>
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
